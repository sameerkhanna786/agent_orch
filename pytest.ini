# Pytest configuration for the APEX-Ω test suite.
#
# Multithreaded by default: `-n auto` runs the suite across all CPU cores via
# pytest-xdist (~4x faster: ~39s -> ~9s locally), `--dist worksteal` keeps cores
# busy when test durations are uneven. The suite is process-parallel safe — every
# test uses its own tempdir/run-dir (no shared global state), so sharding across
# workers does not introduce flakiness.
#
# Plain `pytest` (autoloads plugins) picks these up automatically. When plugin
# autoload is disabled (PYTEST_DISABLE_PLUGIN_AUTOLOAD=1, used to drop json-report),
# add `-p xdist` so the parallel runner is still loaded, e.g.:
#   PYTHONPATH=. PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 pytest -p xdist -n auto tests/
[pytest]
addopts = -n auto --dist worksteal
testpaths = tests
